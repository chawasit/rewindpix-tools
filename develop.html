<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Develop — RewindPix</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#12161b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RewindPix">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
<style>
  .dev-wrap { display: grid; grid-template-columns: 1fr 300px; gap: 18px; align-items: start; }
  @media (max-width: 780px){ .dev-wrap { grid-template-columns: 1fr; } }
  #preview { width: 100%; background: #0a0c0f; border: 1px solid #1e232a; border-radius: 10px; min-height: 200px; }
  #preview canvas { display:block; width: 100%; height: auto; border-radius: 10px; }
  .panel label { display:block; font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; color:#9aa4af; margin:14px 0 4px; }
  .panel .val { float:right; color:#e6e8eb; font-family:ui-monospace,Menlo,monospace; }
  .panel input[type=range]{ width:100%; }
  .panel select{ width:100%; padding:9px; border-radius:9px; border:1px solid #2a2f37; background:#14181d; color:#e6e8eb; }
  .filebtn{ display:inline-block; }
</style>
</head>
<body>
<header>
  <h1>RewindPix · Develop</h1>
  <span class="spacer"></span>
  <nav><a href="index.html">Gallery</a><a href="presets.html">Presets</a><a href="set-roll-size.html">Roll size</a></nav>
</header>
<main>
  <div class="row">
    <label class="filebtn"><button onclick="document.getElementById('file').click()">Choose photo…</button>
      <input id="file" type="file" accept="image/jpeg,image/png" hidden></label>
    <button id="export" class="primary" disabled>Export full-res ⤓</button>
    <span id="photoName" style="color:#9aa4af;font-size:.85rem"></span>
  </div>
  <div class="msg" id="msg"></div>
  <div class="dev-wrap">
    <div id="preview"><div style="padding:40px;color:#7b848f;text-align:center">Choose a photo to develop.</div></div>
    <div class="panel">
      <label>Film look (LUT)</label>
      <select id="lut"><option value="">None (original)</option></select>
      <div id="sliders"></div>
      <button id="reset" style="margin-top:14px">Reset params</button>
    </div>
  </div>
  <p class="caution">Unofficial · reverse-engineered · use at your own risk. Develop runs entirely in your browser (WebGL); nothing is uploaded.</p>
</main>
<script src="camera.js"></script>
<script src="develop.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const FIELDS = [
    {k:"LUM",min:-100,max:100},{k:"CONTRAST",min:0,max:100},
    {k:"RGAIN",min:0,max:255},{k:"GGAIN",min:0,max:255},{k:"BGAIN",min:0,max:255},
    {k:"HUE",min:-100,max:100},{k:"SAT",min:-100,max:100},
  ];
  const params = Object.assign({}, RPDev.DEFAULT_PARAMS);
  let engine, photo = null, lutImg = null;
  function msg(t,k){ const m=$("msg"); m.textContent=t; m.className="msg show "+(k||"wait"); }

  // sliders
  $("sliders").innerHTML = FIELDS.map(f =>
    `<label>${f.k}<span class="val" id="v_${f.k}">${params[f.k]}</span></label>
     <input type="range" id="s_${f.k}" min="${f.min}" max="${f.max}" step="1" value="${params[f.k]}">`).join("");
  FIELDS.forEach(f => { const s=$("s_"+f.k); s.oninput=()=>{ params[f.k]=+s.value; $("v_"+f.k).textContent=s.value; preview(); }; });
  $("reset").onclick = () => { Object.assign(params, RPDev.DEFAULT_PARAMS); FIELDS.forEach(f=>{ $("s_"+f.k).value=params[f.k]; $("v_"+f.k).textContent=params[f.k]; }); preview(); };

  function ensureEngine(){ if(!engine){ engine = RPDev.createEngine(); const p=$("preview"); p.innerHTML=""; p.appendChild(engine.canvas); } }
  function previewDims(){ const [w,h]=engine.size; const W=Math.min(1000,w); return [W, Math.round(W*h/w)]; }
  function preview(){ if(!photo) return; ensureEngine(); const [pw,ph]=previewDims(); engine.render(params,pw,ph); }

  async function loadPhoto(src, name){
    try{
      const img = await RPDev.load(src);
      photo = img; ensureEngine(); engine.setPhoto(img); preview();
      $("export").disabled=false; $("photoName").textContent = name||""; msg(img.naturalWidth+"×"+img.naturalHeight+" loaded.","ok");
    }catch(e){ msg("Couldn't load photo: "+e.message,"err"); }
  }

  $("file").onchange = e => { const f=e.target.files[0]; if(!f) return; loadPhoto(URL.createObjectURL(f), f.name); };

  // LUT dropdown from bundled luts.json
  fetch("luts/luts.json").then(r=>r.json()).then(d=>{
    d.luts.forEach(l => { const o=document.createElement("option"); o.value=l.file; o.textContent=l.name; $("lut").appendChild(o); });
  }).catch(()=>{});
  $("lut").onchange = async () => {
    const f=$("lut").value;
    if(!f){ lutImg=null; if(engine){ engine.setLut(null); preview(); } return; }
    try{ lutImg = await RPDev.load("luts/"+f); ensureEngine(); engine.setLut(lutImg); preview(); }
    catch(e){ msg("LUT load failed: "+e.message,"err"); }
  };

  $("export").onclick = async () => {
    if(!photo) return; const [w,h]=engine.size;
    msg("Rendering full resolution…","wait");
    engine.render(params, w, h);
    const blob = await engine.toBlob("image/jpeg", 0.92);
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    const base = ($("photoName").textContent||"photo").replace(/\.[^.]+$/,"");
    const look = $("lut").selectedOptions[0]?.textContent || "orig";
    a.href=url; a.download = base+"_"+look+".jpg"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),4000);
    preview(); msg("Exported "+w+"×"+h+" JPEG.","ok");
  };

  // optional: ?photo=<A:\...fpath> to develop a camera photo (same-origin when served by the camera)
  const q = new URLSearchParams(location.search).get("photo");
  if(q){ loadPhoto(RP.urlFor(q), q.split("\\").pop()); }
})();
</script>
</body>
</html>
