<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RewindPix</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#12161b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RewindPix">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>RewindPix</h1>
  <div class="status-bar" id="status">connecting…</div>
  <span class="spacer"></span>
</header>
<main>
  <div class="row" id="galtools">
    <button class="primary" id="sync">Sync ↻</button>
    <button id="select">Select ☑</button>
    <button id="downloadall">Download all (ZIP)</button>
    <button id="reconnect">Reconnect</button>
    <button id="marksynced">Mark all synced</button>
    <button id="clearseen">Reset sync memory</button>
    <button id="finishroll" title="Delete the current-roll working copies (._FILM) and reset the frame budget">Finish roll</button>
  </div>
  <div class="row" id="selbar" style="display:none">
    <b id="selcount" style="flex:0 0 auto;margin-right:6px">0 selected</b>
    <button class="primary" id="seldl">Download</button>
    <button id="selzip">ZIP</button>
    <button id="selall">Select all</button>
    <button id="selcancel">Cancel</button>
  </div>
  <div class="msg" id="msg"></div>
  <div id="galControls">
    <div class="chips" id="folderChips"></div>
    <div class="chips" id="timeChips"></div>
  </div>
  <div id="gallery"></div>
  <p class="caution">
    Unofficial · reverse-engineered · use at your own risk. For full access open this
    <b>from the camera's own WiFi</b> (served by the camera at <code>http://192.168.1.254/</code>).
  </p>
</main>
<script src="camera.js"></script>
<script src="zip.js"></script>
<script src="develop.js"></script>
<script src="app.js"></script>
<script src="nav.js"></script>
</body>
</html>
